<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hud">
        <h1>Snake</h1>
        <p id="score">Score: 0</p>
      </header>

      <section id="status" class="status" aria-live="polite">Use arrows or WASD to move.</section>

      <section
        id="board"
        class="board"
        role="grid"
        aria-label="Snake game board"
      ></section>

      <section class="controls">
        <button type="button" data-dir="up">Up</button>
        <div>
          <button type="button" data-dir="left">Left</button>
          <button type="button" data-dir="down">Down</button>
          <button type="button" data-dir="right">Right</button>
        </div>
      </section>

      <section class="actions">
        <button id="pause" type="button">Pause</button>
        <button id="restart" type="button">Restart</button>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
